<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nergis & Can - Nikah Davetiyesi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #fbf9fc url('bg-texture.png') repeat;
    font-family: 'Montserrat', sans-serif;
    color: #6b6357;
    min-height: 100vh;
  }
  .page {
    max-width: 520px;
    margin: 0 auto;
    background: #fbf9fc url('bg-texture.png') repeat;
    min-height: 100vh;
    box-shadow: 0 0 40px rgba(0,0,0,0.06);
  }
  .invite-image {
    width: 100%;
    display: block;
  }
  .info {
    padding: 40px 28px 60px;
    text-align: center;
  }
  .label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    letter-spacing: 4px;
    color: #8a7f70;
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .countdown {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 46px;
  }
  .unit { min-width: 62px; }
  .num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 400;
    color: #6b6357;
    line-height: 1;
  }
  .unit-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #a59a88;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: #c9bda8;
    margin: 0 auto 30px;
  }
  .location-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: #8a7f70;
    margin-bottom: 4px;
  }
  .location-sub {
    font-size: 11px;
    letter-spacing: 2px;
    color: #a59a88;
    margin-bottom: 22px;
    text-transform: uppercase;
  }
  .map-wrap {
    width: 100%;
    max-width: 440px;
    margin: 0 auto 20px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(107, 99, 87, 0.15);
    border: 1px solid rgba(184, 168, 144, 0.3);
  }
  .map-wrap iframe {
    display: block;
    width: 100%;
    height: 260px;
    border: 0;
  }
  .location-btn {
    display: inline-block;
    padding: 14px 32px;
    background: transparent;
    color: #6b6357;
    border: 1px solid #b8a890;
    border-radius: 2px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .location-btn:hover {
    background: #b8a890;
    color: #fbf7f0;
  }
  @media (max-width: 420px) {
    .num { font-size: 34px; }
    .unit { min-width: 52px; }
    .countdown { gap: 8px; }
    .map-wrap iframe { height: 220px; }
  }
</style>
</head>
<body>
  <div class="page">
    <img src="davetiye.png" alt="Nergis & Can Davetiye" class="invite-image">

    <div class="info">
      <div class="label">Nikaha Kalan</div>
      <div class="countdown">
        <div class="unit"><div class="num" id="days">00</div><div class="unit-label">Gün</div></div>
        <div class="unit"><div class="num" id="hours">00</div><div class="unit-label">Saat</div></div>
        <div class="unit"><div class="num" id="minutes">00</div><div class="unit-label">Dakika</div></div>
        <div class="unit"><div class="num" id="seconds">00</div><div class="unit-label">Saniye</div></div>
      </div>

      <div class="divider"></div>

      <div class="location-name">Erdal İnönü Kent Parkı</div>
      <div class="location-sub">Antalya · Muratpaşa</div>

      <div class="map-wrap">
        <iframe
          src="https://maps.google.com/maps?q=36.861392,30.728644&hl=tr&z=16&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          allowfullscreen></iframe>
      </div>

      <a href="https://share.google/9MzaAOGUPWgJApaND" target="_blank" rel="noopener" class="location-btn">Konuma Git</a>
    </div>
  </div>

<script>
  const targetDate = new Date('2026-05-23T17:30:00+03:00').getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const diff = targetDate - now;

    if (diff <= 0) {
      ['days','hours','minutes','seconds'].forEach(id => document.getElementById(id).textContent = '00');
      return;
    }

    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);

    document.getElementById('days').textContent = String(days).padStart(2, '0');
    document.getElementById('hours').textContent = String(hours).padStart(2, '0');
    document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
    document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
</body>
</html>
